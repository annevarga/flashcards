<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DevOps Flashcards</title>

<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    margin-top:60px;
}

.card{
    width:500px;
    height:250px;
    margin:auto;
    background:white;
    color:black;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:22px;
    cursor:pointer;
    padding:20px;
}

button{
    margin:20px;
    padding:10px 20px;
    font-size:16px;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
</style>

</head>

<body>

<h1>DevOps Flashcards</h1>
<p>Click the card to reveal the answer</p>

<div class="card" onclick="flipCard()" id="card">
Question
</div>

<br>

<button onclick="prevCard()">Previous</button>
<button onclick="nextCard()">Next</button>

<script>

let cards = [
{
q:"What is Kubernetes?",
a:"An open-source platform that automates deployment, scaling, and management of containerized applications."
},
{
q:"What is Docker?",
a:"A platform used to build, package, and run applications inside containers."
},
{
q:"What is a Kubernetes Pod?",
a:"The smallest deployable unit in Kubernetes that runs one or more containers."
},
{
q:"What is CI/CD?",
a:"Continuous Integration and Continuous Deployment pipeline for automated software delivery."
},
{
q:"What is Infrastructure as Code?",
a:"Managing infrastructure using code instead of manual configuration."
}
];

let current = 0;
let showingAnswer = false;

function updateCard(){
document.getElementById("card").innerText = cards[current].q;
showingAnswer = false;
}

function flipCard(){
let card = document.getElementById("card");

if(showingAnswer){
card.innerText = cards[current].q;
showingAnswer = false;
}else{
card.innerText = cards[current].a;
showingAnswer = true;
}
}

function nextCard(){
current++;
if(current >= cards.length) current = 0;
updateCard();
}

function prevCard(){
current--;
if(current < 0) current = cards.length-1;
updateCard();
}

updateCard();

</script>

</body>
</html>
